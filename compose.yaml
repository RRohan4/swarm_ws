services:
  # ── Gazebo simulation ────────────────────────────────────────────────────────
  sim:
    build: .
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: >
      bash -c ". /ws/install/setup.sh &&
               ros2 launch swarm_bringup gazebo.launch.py"

  # ── Robot stacks ─────────────────────────────────────────────────────────────
  robot_0:
    build: .
    network_mode: host
    command: >
      bash -c ". /ws/install/setup.sh &&
               ros2 launch swarm_bringup robot_stack.launch.py
               robot_id:=robot_0 x:=0.6 y:=0.6 z:=0.05 yaw:=1.5708"
    depends_on: [sim]

  robot_1:
    build: .
    network_mode: host
    command: >
      bash -c ". /ws/install/setup.sh &&
               ros2 launch swarm_bringup robot_stack.launch.py
               robot_id:=robot_1 x:=1.8 y:=0.6 z:=0.05 yaw:=1.5708"
    depends_on: [sim]

  # ── Global nodes ─────────────────────────────────────────────────────────────
  map_merge:
    build: .
    network_mode: host
    command: >
      bash -c ". /ws/install/setup.sh &&
               ros2 launch swarm_bringup map_merge.launch.py
               robot_ids:=robot_0,robot_1"
    depends_on: [robot_0, robot_1]

  foxglove:
    build: .
    network_mode: host
    command: >
      bash -c ". /ws/install/setup.sh &&
               ros2 run foxglove_bridge foxglove_bridge
               --ros-args -p port:=8765 -p use_sim_time:=true"
    depends_on: [sim]

  # ── Single-robot regression (Phase 0) ────────────────────────────────────────
  sim_single:
    build: .
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: >
      bash -c ". /ws/install/setup.sh &&
               ros2 launch swarm_exploration single_robot.launch.py"
    profiles: [single]
