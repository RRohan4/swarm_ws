services:

  # ── Single-robot sim (current working setup) ────────────────────────────────
  # Runs Gazebo headless + SLAM Toolbox + Foxglove bridge on ws://localhost:8765
  sim:
    build: .
    network_mode: host
    environment:
      # X11 forwarding for optional GUI tools; set DISPLAY on host before running
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: >
      bash -c ". /ws/install/setup.sh &&
               ros2 launch swarm_exploration single_robot.launch.py"

