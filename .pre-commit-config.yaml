repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Formatting for XML, XACRO, JSON, and YAML via Prettier
  - repo: local
    hooks:
      - id: prettier
        name: Prettier (XML, XACRO, JSON, YAML)
        language: system
        entry: prettier --write
        files: \.(xml|xacro|json|yaml|yml)$

  # Python linting + formatting via Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
